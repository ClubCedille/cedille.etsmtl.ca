{{ with .Site.Data.aboutUs }}
{{ if .enable }}
<div class="row">
  <h2 class="title-border"><b>{{ .title }}</b></h2>
</div>

<div class="row mt-4">
  <!-- Sidebar navigation -->
  <!-- <div class="col-lg-2 d-none d-lg-block"> -->
  <!--   <nav class="sticky-top text-end py-2 pe-3"> -->
  <!--     <ul class="list-unstyled small"> -->
  <!--       {{ range .sections }} -->
  <!--       <li class="mb-1"> -->
  <!--         <a href="#{{ .title }}" class="text-decoration-none text-muted">{{ .subtitle }}</a> -->
  <!--       </li> -->
  <!--       {{ end }} -->
  <!--     </ul> -->
  <!--   </nav> -->
  <!-- </div> -->

  <!-- Main content -->
  <div class="col-lg-10">
    {{ range .sections }}
    <div class="mb-5" id="{{ .title }}">
      <h3 class="mb-3"><b>{{ .subtitle }}</b></h3>

      {{ .text | safeHTML }}

      {{ if .descriptionAreas }}
      <div class="card mt-3">
        <!-- Tab navigation -->
        <div class="card-header">
          <nav class="nav nav-tabs card-header-tabs" id="pills-tab-{{ .title }}" role="tablist">
            {{ range .descriptionAreas }}
            <button
              class="nav-link{{ if .active }} {{ .active }}{{ end }}"
              id="pills-{{ .name }}-tab"
              data-bs-toggle="tab"
              data-bs-target="#pills-{{ .name }}"
              type="button"
              role="tab"
              aria-controls="pills-{{ .name }}"
              aria-selected="{{ if .active }}true{{ else }}false{{ end }}">
              <b>{{ .title }}</b>
            </button>
            {{ end }}
          </nav>
        </div>
        <!-- Tab content -->
        <div class="card-body">
          <div class="tab-content" id="pills-tabContent-{{ .title }}">
            {{ range .descriptionAreas }}
            <div
              class="tab-pane fade{{ if .showActive }} {{ .showActive }}{{ end }}"
              id="pills-{{ .name }}"
              role="tabpanel"
              aria-labelledby="pills-{{ .name }}-tab">
              {{ .text | safeHTML }}
            </div>
            {{ end }}
          </div>
        </div>
      </div>
      {{ end }}
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
{{ end }}
